<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Brick Breaker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <div class="game-container glass-panel">
        <header class="game-header">
            <h1 class="title">BRICK BREAKER</h1>
            <div class="stats">
                <div class="stat-box glass-panel">
                    <span class="label">SCORE</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="stat-box glass-panel">
                    <span class="label">LIVES</span>
                    <span id="lives" class="value">3</span>
                </div>
            </div>
        </header>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            
            <!-- Overlays -->
            <div id="startScreen" class="overlay glass-panel active">
                <h2>Ready to Break?</h2>
                <p>Use Left/Right arrows or Mouse to move the paddle.</p>
                <button id="startBtn" class="glass-btn">START GAME</button>
            </div>
            
            <div id="gameOverScreen" class="overlay glass-panel">
                <h2>GAME OVER</h2>
                <p>Final Score: <span id="finalScore">0</span></p>
                <button id="restartBtn" class="glass-btn">PLAY AGAIN</button>
            </div>

            <div id="victoryScreen" class="overlay glass-panel">
                <h2>YOU WIN!</h2>
                <p>Outstanding performance.</p>
                <button id="nextLevelBtn" class="glass-btn">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
